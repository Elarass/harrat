<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur Départ harrat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
 	    background-image: (https://external-content.duckduckgo.com/iu/?u=https%3A%	    2F%2Fimages2.alphacoders.com%2F941%2F941898.jpg&f=1&nofb=1&ipt=39c4f037d02c2bde1b7ba1d155cd3fc7fa4460d4dec94e06adc384b60cce3751);
   	    background-size: cover;
   	    background-position: center;
   	    background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 900px;
        }
        h1 {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #count {
            font-size: 8rem;
            font-weight: bold;
            color: #00aaff;
            text-shadow: 0 0 30px #00aaff55;
        }
        p {
            margin-top: 20px;
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        #next {
            color: #00ff88;
        }

        @media (max-width: 768px) {
            h1 { font-size: 0.75rem; letter-spacing: 2px; }
            #count { font-size: 20vw; }
            p { font-size: 0.75rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOMBRES DE MINUTES DEPUIS SONT DÉPART</h1>
        <div id="count">0</div>
        <p>prochainne minute de paix, silence, bonheur, joie, allégresse dans <span id="next">--</span> secondes</p>
    </div>

    <script>
        // ✏️ CHANGER LA DATE ICI quand vous êtes prêt
        const START_DATE = new Date("2025-01-01T00:00:00");

        function updateCounter() {
            const now = new Date();

            if (now < START_DATE) {
                document.getElementById('count').textContent = "0";
                document.getElementById('next').textContent = "--";
                return;
            }

            const diffMs = now - START_DATE;
            const diffMinutes = Math.floor(diffMs / 60000);
            document.getElementById('count').textContent = diffMinutes;

            const seconds = 59 - now.getSeconds();
            document.getElementById('next').textContent = seconds;
        }

        updateCounter();
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
