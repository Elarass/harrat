<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur Départ harrat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://raw.githubusercontent.com/Elarass/harrat/refs/heads/main/fond.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: white;
            position: relative;
        }
        .container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
            max-width: 900px;
        }
        h1 {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #count {
            font-size: 8rem;
            font-weight: bold;
            color: #00aaff;
            text-shadow: 0 0 30px #00aaff55;
            -webkit-text-stroke: 1px white;
        }
        p {
            margin-top: 20px;
            color: #ffffff;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        #next {
            color: #ffffff;
        }

        @media (max-width: 768px) {
            h1 { font-size: 0.75rem; letter-spacing: 2px; }
            #count { font-size: 20vw; }
            p { font-size: 0.75rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <audio id="musique" loop>
        <source src="https://raw.githubusercontent.com/Elarass/harrat/refs/heads/main/musique.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>NOMBRES DE MINUTES DEPUIS SON DÉPART</h1>
        <div id="count">0</div>
        <p>prochaine minute de paix, silence, bonheur, joie, allégresse dans <span id="next">--</span> secondes</p>
    </div>

    <script>
        const START_DATE = new Date('2026-05-29T17:06:00');

        function updateCounter() {
            const now = new Date();

            if (now < START_DATE) {
                document.getElementById('count').textContent = "0";
                document.getElementById('next').textContent = "--";
                return;
            }

            const diffMs = now - START_DATE;
            const diffMinutes = Math.floor(diffMs / 60000);
            document.getElementById('count').textContent = diffMinutes;

            const seconds = 59 - now.getSeconds();
            document.getElementById('next').textContent = seconds;
        }

        updateCounter();
        setInterval(updateCounter, 1000);

        // Lecture audio au premier clic (contourne le blocage navigateur)
        document.addEventListener('click', function() {
            const audio = document.getElementById('musique');
            if (audio.paused) {
                audio.play();
            }
        }, { once: true });
    </script>
</body>
</html>
