<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur Suicides masculins</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 900px;
        }
        h1 {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        #count {
            font-size: 8rem;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 30px #00ff8855;
        }
        p {
            margin-top: 20px;
            color: #555;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        #next {
            color: #00ff88;
        }

        /* RESPONSIVE MOBILE */
        @media (max-width: 768px) {
            h1 {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }
            #count {
                font-size: 20vw;
            }
            p {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOMBRES estimé DE SUICIDES MASCULINS DEPUIS LE 1ER JANVIER DERNIER</h1>
        <div id="count">0</div>
        <p>prochain suicide de votre père, de votre ami, de votre frère, de votre cousin, voisin, collegue, patron dans <span id="next">--</span> secondes</p>
    </div>

    <script>
        async function loadCount() {
            const res = await fetch('/count');
            const data = await res.json();
            document.getElementById('count').textContent = data.count;
        }

        function updateCountdown() {
            const now = new Date();
            const seconds = 59 - now.getSeconds();
            document.getElementById('next').textContent = seconds;
        }

        loadCount();
        updateCountdown();

        setInterval(loadCount, 1000);
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
